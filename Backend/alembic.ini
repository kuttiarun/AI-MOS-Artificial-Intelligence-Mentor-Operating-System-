# =============================================================================
# AI-MOS Backend — Alembic Migration Configuration
# =============================================================================
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory (relative to this file)
script_location = app/migrations

# Python path adjustments (keep blank; uvicorn sets PYTHONPATH)
prepend_sys_path = .

# Template used to generate migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Truncate migration slugs to this many characters
truncate_slug_length = 40

# Output encoding for migration scripts
output_encoding = utf-8

# ---------------------------------------------------------------------------
# The database URL is loaded dynamically inside env.py using pydantic-settings
# so we intentionally leave sqlalchemy.url BLANK here.
# ---------------------------------------------------------------------------
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
